cv:
  name: Atul Koshta
  headline: Full-Stack Software Engineer
  email: atulk@cateringrewards.com
  location: Bangalore, India

  sections:
    summary:
      - Solution engineer who pairs end-to-end architectural ownership with measurable business impact builds platforms that move revenue, conversion, and operational metrics, not just ship code. Comfortable as sole developer on greenfield systems or leading architectural migrations across multi-portal, multi-brand environments, spanning authentication, ETL, financial accounting, wallet, integrations, and AI-powered systems. Establishes engineering culture through proved standard practices, security hardening, and reliability-first design.
    work:
      - company: HAR LLC
        position: Software Engineer (Contract)
        location: Phoenix, AZ, USA (Remote)
        start_date: 2024-09
        end_date: present
        highlights:
          - "Drove **7.4x** monthly revenue growth and managed **$5K+** in customer prepaid balances by designing and delivering a wallet system — credit/debit engine, auto-recharge, brand-level configuration"
          - "Tracked **$13.5K+** platform revenue across **3** streams with **776** compliant journal entries by leading migration from single-entry to **double-entry bookkeeping** — achieved accounting-grade auditability"
          - "**Eliminated DB bottlenecks** and enabled independent scaling of order ingestion and storage layers by designing and executing iterative database decoupling from the scraping pipeline across **2** releases"
          - "Enabled multi-brand and multi-franchise support on a single platform by leading Brand-Group-Store architecture — brand hierarchy schema, franchise group management, Brand Mapper facade pattern"
          - "Unified order ingestion across MonkeyMedia POS, Olo, and marketplace platforms by architecting AWS SQS queue-based async processing — enabled consistent rewards calculation regardless of source"
          - "Automated receipt verification at **83%** operator approval rate by owning the end-to-end receipt pipeline — schema design, S3 upload APIs, AWS Textract OCR with **AI processing**, and operator approval workflow"
          - "Consolidated **47+** notification events across **6** subsystems into a single registry-driven dispatcher with provider-agnostic channels, replacing scattered ad-hoc implementations"
          - "Integrated GoHighLevel and Zapier via a  real-time event-driven pipeline streaming
            customer, order, and reward events to power segment-aware tagging and targeted
            marketing campaigns."
          - "Established the customer-lifecycle foundation across **3** portals serving **552+** customers by architecting and owning a complete authentication system — OTP-based login, Keycloak SSO, NGINX/Lua proxy, JWT management"
          - "Established a single source of truth for downstream services by designing a secure API structure for restaurant owners with Keycloak client auth and an Nginx proxy adapter enforcing standardized contracts"
          - "Provided full delivery audit trail and tamper-proof inbound integrations by designing a webhook system with provider-based delivery tracking, ECDSA signature verification, and admin notification logs UI"
          - "Eliminated information disclosure vulnerabilities in public APIs by leading migration from GUID-based to secure customer IDs across all API surfaces"
          - "Drove test coverage from **0%** to **70%+** in financial, wallet, and payment systems by mandating Test-Driven Development across critical modules and enforcing CI/CD review gates"

      - company: TRGT Digital
        position: Software Development Engineer
        location: Barcelona, Spain
        start_date: 2023-06
        end_date: 2024-01
        highlights:
          - "Enabled campaign performance measurement on a digital marketing platform by designing a user engagement tracking system using Flask and MySQL"
          - "Optimized dashboard load time by **80%** through a Redis caching strategy"

