        end_date: 2023-05
        highlights:
          - "Achieved **~50%** reduction in API response time by engineering an algorithm to update user progress across multiple groups using Node.js and MongoDB"
          - "Adapted EdTech platform to evolving business and end-user needs by shipping iterative feature enhancements"

      - company: Wipro
        position: Solution Quality Assurance Engineer
        location: Bangalore, India
        start_date: 2021-07
