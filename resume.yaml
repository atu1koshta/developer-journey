          - "Delivered release-ready quality gates across enterprise product lines, supporting on-time releases"

    skills:
      - label: Advanced Architecture Patterns
        details: "Event-Driven Microservices, Multi-Tenancy Isolation (Sequelize Facade Pattern), System Decoupling via Queue-Based Processing, Provider-Agnostic Architecture, Registry-Driven Dispatchers, Webhook-Based Event Streaming, Async Consumer Patterns, API Gateway Abstraction"

      - label: Backend & Core Systems
        details: "Node.js/Express (primary), Python/crawl4ai, Sequelize ORM, MySQL Schema Design, Double-Entry Bookkeeping Logic, Financial Ledger Systems, Domain-Driven Design"

      - label: Cloud & Async Processing
        details: "AWS (SQS async consumers, Lambda, S3, Textract OCR, IAM), Queue-Based Microservices, Event-Driven Processing, Independent Scaling Patterns, CI/CD Pipeline Optimization"

      - label: Authentication & Security
        details: "Keycloak SSO Integration, OAuth2/JWT, OTP-Based Auth Flows, NGINX/Lua Proxy Layers, ECDSA Signature Verification, IP-Based Rate Limiting, Redis-Backed Distributed Stores, Information Disclosure Vulnerability Mitigation"

      - label: Data & Performance
        details: "MySQL Schema Migration, Batch Processing Optimization (MongoDB aggregation), Redis Caching Strategies, Async Database Decoupling, Query Optimization for Analytics"

      - label: Testing & Quality
        details: "Test-Driven Development (Jest, Supertest), CI/CD Code Review Enforcement, Test Coverage Progression (0% → 70%+), Integration Testing, Automated Test Data Factories"

      - label: Integrations & External Systems
        details: "GoHighLevel CRM API, Zapier Platform (9 trigger modules), Stripe Payments, SendGrid Email + Webhooks, MSG91 SMS, Google APIs, Web Scraping (crawl4ai)"

      - label: AI & Advanced Processing
        details: "AWS Textract OCR, AI-Powered Data Extraction, Intelligent Web Scraping (crawl4ai), Receipt Parsing Automation"

      - label: Leadership & Ownership
        details: "End-to-End Ownership (sole-developer delivery of Zapier integration, wallet system, authentication platform), Technical Leadership (led architectural migrations across 3 portals and 6 subsystems), Engineering Culture Driver (mandated TDD adoption, drove coverage 0% → 70%+), Independent Architecture (designed and delivered platforms from scratch with full lifecycle ownership)"

